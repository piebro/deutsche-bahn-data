name: Monthly Data Release

on:
  schedule:
    # Run on the 2nd day of each month at 4am UTC
    - cron: '0 4 2 * *'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Rebuild and re-upload ALL months (instead of just last month)'
        type: boolean
        default: false

jobs:
  monthly-release:
    if: ${{ inputs.rebuild_all != true }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --python 3.13

      - name: Process last month
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          PREV_YEAR=$(date -u -d "last month" +"%Y")
          PREV_MONTH=$(date -u -d "last month" +"%m")
          bash scripts/process_month.sh "$PREV_YEAR" "$PREV_MONTH"

  rebuild-all:
    if: ${{ inputs.rebuild_all == true }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --python 3.13

      - name: Rebuild every released month
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Loop from 2024-07 (earliest available data) up to last month.
          Y=2024
          M=7
          END_YM=$(date -u -d "last month" +"%Y-%m")
          while :; do
              YM=$(printf "%d-%02d" "$Y" "$M")
              [[ "$YM" > "$END_YM" ]] && break

              bash scripts/process_month.sh "$Y" "$M"
              echo "Cleaning up local files for $YM..."
              rm -rf raw_data
              rm -f "monthly_processed_data/data-$YM.parquet"

              M=$((M + 1))
              (( M > 12 )) && { M=1; Y=$((Y + 1)); }
          done
