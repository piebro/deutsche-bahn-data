name: Monthly Data Release

on:
  schedule:
    # Run on the 2nd day of each month at 4am UTC
    - cron: '0 4 2 * *'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Rebuild and re-upload ALL months (instead of just last month)'
        type: boolean
        default: false

jobs:
  monthly-release:
    if: ${{ inputs.rebuild_all != true }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --python 3.13

      - name: Process last month
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          PREV_YEAR=$(date -u -d "last month" +"%Y")
          PREV_MONTH=$(date -u -d "last month" +"%m")
          bash scripts/process_month.sh "$PREV_YEAR" "$PREV_MONTH"

  # Emits the list of months (2024-07 through last month) as a JSON array
  # so rebuild-all below can fan out into one job per month.
  list-months:
    if: ${{ inputs.rebuild_all == true }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - id: generate
        run: |
          Y=2024
          M=7
          END_YM=$(date -u -d "last month" +"%Y-%m")
          months=""
          while :; do
              YM=$(printf "%d-%02d" "$Y" "$M")
              [[ "$YM" > "$END_YM" ]] && break
              months+="\"$YM\","
              M=$((M + 1))
              (( M > 12 )) && { M=1; Y=$((Y + 1)); }
          done
          matrix="[${months%,}]"
          echo "Matrix: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # One job per month, run sequentially so concurrent hf uploads don't race
  # on the same dataset repo. Each job gets its own fresh 6h timer.
  rebuild-all:
    if: ${{ inputs.rebuild_all == true }}
    needs: list-months
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        ym: ${{ fromJson(needs.list-months.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --python 3.13

      - name: Process ${{ matrix.ym }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          YM: ${{ matrix.ym }}
        run: |
          Y=${YM%-*}
          M=${YM#*-}
          bash scripts/process_month.sh "$Y" "$M"
